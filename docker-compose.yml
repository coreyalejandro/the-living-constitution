version: '3.8'

# The Living Constitution — service composition
# Status: prototype-grade — NOT suitable as a production safety layer
#
# Services:
#   control-plane  — Next.js frontend (port 3000)
#   guardian       — Python constitutional enforcement API (port 8001)
#   postgres       — persistent store
#   redis          — session cache
#   nginx          — reverse proxy (port 80)
#
# Monitoring stack available via --profile monitoring:
#   prometheus, grafana, loki, promtail

services:
  # --------------------------------------------------------------------------
  # TLC Control Plane (Next.js)
  # --------------------------------------------------------------------------
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_TYPE: control-plane
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GUARDIAN_URL=http://guardian:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      guardian:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - tlc-network

  # --------------------------------------------------------------------------
  # Guardian Service (Python constitutional enforcement)
  # --------------------------------------------------------------------------
  guardian:
    build:
      context: .
      dockerfile: docker/guardian.Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GUARDIAN_CORS_ORIGINS=${GUARDIAN_CORS_ORIGINS:-http://localhost:3000}
      - TLC_GUARDIAN_STRICT_SEMGRAPH=${TLC_GUARDIAN_STRICT_SEMGRAPH:-0}
      - TLC_GUARDIAN_AUTOGEN_DISABLED=${TLC_GUARDIAN_AUTOGEN_DISABLED:-0}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - tlc-network

  # --------------------------------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tlc_db}
      - POSTGRES_USER=${POSTGRES_USER:-tlc_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tlc_user} -d ${POSTGRES_DB:-tlc_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tlc-network

  # --------------------------------------------------------------------------
  # Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tlc-network

  # --------------------------------------------------------------------------
  # Nginx reverse proxy
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    tmpfs:
      - /var/run/nginx
      - /var/cache/nginx
    depends_on:
      control-plane:
        condition: service_started
      guardian:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - tlc-network

  # --------------------------------------------------------------------------
  # Monitoring — opt-in with: docker compose --profile monitoring up
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=200h
      - --web.enable-lifecycle
    restart: unless-stopped
    networks:
      - tlc-network

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - tlc-network

  loki:
    image: grafana/loki:latest
    profiles: [monitoring]
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - tlc-network

  promtail:
    image: grafana/promtail:latest
    profiles: [monitoring]
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - tlc-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  tlc-network:
    driver: bridge
