name: Verify Living Constitution

on:
  workflow_dispatch:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  verify-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python verification dependencies
        run: pip install -r requirements-verify.txt

      - name: Verify base camp structure exists
        run: |
          echo "=== Checking base camp structure ==="
          test -f CLAUDE.md || (echo "FAIL: CLAUDE.md missing" && exit 1)
          test -f THE_LIVING_CONSTITUTION.md || (echo "FAIL: THE_LIVING_CONSTITUTION.md missing" && exit 1)
          test -f tasks/todo.md || (echo "FAIL: tasks/todo.md missing" && exit 1)
          test -f tasks/lessons.md || (echo "FAIL: tasks/lessons.md missing" && exit 1)
          test -f config/domains.ts || (echo "FAIL: config/domains.ts missing" && exit 1)
          test -f config/projects.ts || (echo "FAIL: config/projects.ts missing" && exit 1)
          test -f verification/MATRIX.md || (echo "FAIL: verification/MATRIX.md missing" && exit 1)
          echo "PASS: Base camp structure verified"

      - name: Verify all project folders have CLAUDE.md and BUILD_CONTRACT.md
        run: |
          echo "=== Checking project folders ==="
          FAIL=0
          for project in sentinelos proactive consentchain uicare teaser-video; do
            if [ ! -f "projects/$project/CLAUDE.md" ]; then
              echo "FAIL: projects/$project/CLAUDE.md missing"
              FAIL=1
            fi
            if [ ! -f "projects/$project/BUILD_CONTRACT.md" ]; then
              echo "FAIL: projects/$project/BUILD_CONTRACT.md missing"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 0 ]; then
            echo "PASS: All project folders have CLAUDE.md + BUILD_CONTRACT.md"
          else
            exit 1
          fi

      - name: Verify 4 safety domains defined
        run: |
          DOMAIN_COUNT=$(grep -c '"id":' config/domains.ts)
          echo "Found $DOMAIN_COUNT domains"
          test "$DOMAIN_COUNT" -eq 4 || (echo "FAIL: Expected 4 domains, found $DOMAIN_COUNT" && exit 1)
          echo "PASS: 4 safety domains defined"

      - name: Verify verification matrix has claims
        run: |
          CLAIM_COUNT=$(grep -c "^| [0-9]" verification/MATRIX.md)
          echo "Found $CLAIM_COUNT claims in verification matrix"
          test "$CLAIM_COUNT" -ge 20 || (echo "FAIL: Expected 20+ claims, found $CLAIM_COUNT" && exit 1)
          echo "PASS: Verification matrix has $CLAIM_COUNT claims"

      - name: Emit GitHub Actions provenance (stdout)
        run: |
          echo "=== GitHub Actions provenance ==="
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_RUN_ATTEMPT=$GITHUB_RUN_ATTEMPT"
          echo "GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "GITHUB_JOB=$GITHUB_JOB"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "RUNNER_OS=$RUNNER_OS"
          date -u +"%Y-%m-%dT%H:%M:%SZ"

      - name: Verify project topology (with governance chain)
        run: |
          set -euo pipefail
          python3 scripts/verify_project_topology.py --root . --with-governance

      - name: Verify governance chain (parity second pass)
        run: |
          set -euo pipefail
          python3 scripts/verify_governance_chain.py --root .

      - name: Upload governance verification run artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: governance-verification-runs-${{ github.run_id }}-${{ github.run_attempt }}
          path: verification/runs/*.json
          if-no-files-found: error
