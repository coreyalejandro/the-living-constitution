name: Verify Living Constitution

# Doc constitution check (verify_document_constitution.py) runs in the first Python steps below.
# Triggers are intentionally broad: narrow branch filters silently skipped CI for many branch names.
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - "dependabot/**"
  pull_request:
  schedule:
    - cron: "25 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  verify-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Private submodule repos may deny the default GITHUB_TOKEN ("Repository not found").
      # Optional: repo secret SUBMODULES_PAT (fine-grained PAT, contents:read on submodule repos).
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT || secrets.GITHUB_TOKEN }}

      - name: Bootstrap repository
        run: ./scripts/bootstrap_repo.sh

      - name: Verify anchor availability
        run: |
          echo "=== TLC tags ==="
          git tag --list
          echo "=== consentchain submodule tags ==="
          git -C projects/consentchain tag --list

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python verification dependencies
        run: pip install -r requirements-verify.txt

      - name: Guardian health check
        run: python3 src/guardian.py --health-check

      - name: Guardian invariant enforcement acceptance
        run: python3 scripts/test_guardian_invariants.py --invariant INVARIANT_ARTICLE_IV_01

      - name: Guardian read-only enforcement acceptance
        run: python3 scripts/test_guardian_readonly.py

      - name: Verify EVAL-001 evidence schema and compliance
        run: |
          set -euo pipefail
          python3 src/guardian.py --verify-evidence projects/evaluation/verification --schema projects/c-rsp/schemas/evidence_schema.json
          python3 src/guardian.py --check-compliance EVAL-001 --evidence-dir projects/evaluation/verification

      - name: Verify C-RSP template structure (guided + FDE executed instance)
        run: ./scripts/verify_crsp_template_bundle.sh
        # Section title alignment only (## 0.–## 17.); §6A ordered-operations table content is not Markdown-schema-validated here.

      - name: Upload C-RSP structural diff reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: c-rsp-structure-${{ github.run_id }}-${{ github.run_attempt }}
          path: verification/c-rsp-structure/*.json
          if-no-files-found: ignore

      - name: Verify documentation constitution (MVDS + frontmatter + root allowlist)
        run: python3 scripts/verify_document_constitution.py --root .

      - name: Documentation compliance score
        run: python3 scripts/compliance_score_docs.py --root . --json-out verification/docs_compliance.json

      - name: Verify evaluation JSON-canonical docs are in sync
        run: python3 projects/evaluation/scripts/json_docs.py check

      - name: Upload documentation compliance artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-compliance-${{ github.run_id }}-${{ github.run_attempt }}
          path: verification/docs_compliance.json
          if-no-files-found: error

      # INVARIANT_42: aggregate_status() can differ between developer machines and CI (e.g. cross-repo
      # subprocess). Re-render on the runner so committed STATUS matches CI aggregate before checks.
      - name: Render STATUS surface (CI parity)
        run: python3 scripts/render_status_surface.py --root .

      - name: Verify base camp structure exists
        run: |
          echo "=== Checking base camp structure ==="
          test -f CLAUDE.md || (echo "FAIL: CLAUDE.md missing" && exit 1)
          test -f THE_LIVING_CONSTITUTION.md || (echo "FAIL: THE_LIVING_CONSTITUTION.md missing" && exit 1)
          test -f tasks/todo.md || (echo "FAIL: tasks/todo.md missing" && exit 1)
          test -f tasks/lessons.md || (echo "FAIL: tasks/lessons.md missing" && exit 1)
          test -f config/domains.ts || (echo "FAIL: config/domains.ts missing" && exit 1)
          test -f config/projects.ts || (echo "FAIL: config/projects.ts missing" && exit 1)
          test -f verification/MATRIX.md || (echo "FAIL: verification/MATRIX.md missing" && exit 1)
          echo "PASS: Base camp structure verified"

      - name: Verify all project folders have CLAUDE.md and BUILD_CONTRACT.md
        run: |
          echo "=== Checking project folders ==="
          FAIL=0
          for project in sentinelos proactive consentchain uicare teaser-video; do
            if [ ! -f "projects/$project/CLAUDE.md" ]; then
              echo "FAIL: projects/$project/CLAUDE.md missing"
              FAIL=1
            fi
            if [ ! -f "projects/$project/BUILD_CONTRACT.md" ]; then
              echo "FAIL: projects/$project/BUILD_CONTRACT.md missing"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 0 ]; then
            echo "PASS: All project folders have CLAUDE.md + BUILD_CONTRACT.md"
          else
            exit 1
          fi

      - name: Verify 4 safety domains defined
        run: |
          DOMAIN_COUNT=$(grep -E 'id: "(epistemic|human|cognitive|empirical)"' config/domains.ts | wc -l | tr -d ' ')
          echo "Found $DOMAIN_COUNT domain entries"
          test "$DOMAIN_COUNT" -eq 4 || (echo "FAIL: Expected 4 domains, found $DOMAIN_COUNT" && exit 1)
          echo "PASS: 4 safety domains defined"

      - name: Verify verification matrix has claims
        run: |
          CLAIM_COUNT=$(grep -c "^| [0-9]" verification/MATRIX.md)
          echo "Found $CLAIM_COUNT claims in verification matrix"
          test "$CLAIM_COUNT" -ge 20 || (echo "FAIL: Expected 20+ claims, found $CLAIM_COUNT" && exit 1)
          echo "PASS: Verification matrix has $CLAIM_COUNT claims"

      - name: Emit GitHub Actions provenance (stdout)
        run: |
          echo "=== GitHub Actions provenance ==="
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_RUN_ATTEMPT=$GITHUB_RUN_ATTEMPT"
          echo "GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "GITHUB_JOB=$GITHUB_JOB"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "RUNNER_OS=$RUNNER_OS"
          date -u +"%Y-%m-%dT%H:%M:%SZ"

      - name: Verify project topology (with governance chain)
        run: |
          set -euo pipefail
          python3 scripts/verify_project_topology.py --root . --with-governance

      - name: Verify governance chain (parity second pass)
        run: |
          set -euo pipefail
          python3 scripts/verify_governance_chain.py --root .

      - name: Append regression ledger (CI recorded run)
        if: success()
        run: python3 scripts/append_regression_ledger.py

      - name: Verify institutionalization layer
        if: success()
        run: python3 scripts/verify_institutionalization.py --root .

      - name: Verify cross-repo governance consistency
        if: success()
        run: |
          set -euo pipefail
          python3 scripts/verify_cross_repo_consistency.py --canonical-root . --target-root projects/consentchain

      - name: Adversarial failure-injection governance tests
        if: success()
        run: python3 scripts/governance_failure_injection_tests.py

      - name: Generate supply-chain attestation
        if: success()
        run: python3 scripts/generate_attestation.py --root .

      - name: Verify supply-chain attestation
        if: success()
        run: |
          set -euo pipefail
          python3 scripts/verify_attestation.py --root . --attestation verification/attestations/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json

      - name: Upload governance verification run artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: governance-verification-runs-${{ github.run_id }}-${{ github.run_attempt }}
          path: verification/runs/*.json
          if-no-files-found: error

      - name: Upload supply-chain attestation
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-attestation-${{ github.run_id }}-${{ github.run_attempt }}
          path: verification/attestations/*.json
          if-no-files-found: error

      - name: Download governance artifact for CI self-verification
        if: success()
        uses: actions/download-artifact@v4
        with:
          name: governance-verification-runs-${{ github.run_id }}-${{ github.run_attempt }}
          path: verification/_ci_download_governance

      - name: CI self-verify governance artifact (schema + GITHUB_SHA)
        if: success()
        env:
          GITHUB_ARTIFACT_DIR: verification/_ci_download_governance
        run: |
          set -euo pipefail
          python3 scripts/ci_self_verify_governance_artifact.py
