name: Production Deployment

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Setup Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Create namespace and apply base configuration
      run: |
        export KUBECONFIG=kubeconfig
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/configmap.yaml

    - name: Apply secrets (with production values)
      env:
        DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
        GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
      run: |
        export KUBECONFIG=kubeconfig
        # Create secrets with actual production values
        kubectl create secret generic tlc-secrets \
          --from-literal=DATABASE_PASSWORD="$DATABASE_PASSWORD" \
          --from-literal=DATABASE_URL="postgresql://tlc_user:$DATABASE_PASSWORD@postgres-service:5432/tlc_db" \
          --from-literal=ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
          --from-literal=OPENAI_API_KEY="$OPENAI_API_KEY" \
          --from-literal=GOOGLE_API_KEY="$GOOGLE_API_KEY" \
          --from-literal=JWT_SECRET="$JWT_SECRET" \
          --from-literal=ENCRYPTION_KEY="$ENCRYPTION_KEY" \
          --from-literal=SESSION_SECRET="$SESSION_SECRET" \
          --from-literal=GUARDIAN_API_KEY="$GUARDIAN_API_KEY" \
          --from-literal=GRAFANA_ADMIN_PASSWORD="$GRAFANA_ADMIN_PASSWORD" \
          --namespace=tlc-production \
          --dry-run=client -o yaml | kubectl apply -f -
        
        kubectl create secret generic postgres-secret \
          --from-literal=POSTGRES_DB="tlc_db" \
          --from-literal=POSTGRES_USER="tlc_user" \
          --from-literal=POSTGRES_PASSWORD="$DATABASE_PASSWORD" \
          --namespace=tlc-production \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy infrastructure components
      run: |
        export KUBECONFIG=kubeconfig
        kubectl apply -f k8s/database.yaml
        kubectl apply -f k8s/redis.yaml
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=database -n tlc-production --timeout=300s
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=redis -n tlc-production --timeout=300s

    - name: Deploy application services
      run: |
        export KUBECONFIG=kubeconfig
        kubectl apply -f k8s/guardian-deployment.yaml
        kubectl apply -f k8s/semgraph-deployment.yaml
        kubectl apply -f k8s/control-plane-deployment.yaml
        
        # Wait for deployments to be ready
        kubectl rollout status deployment/guardian -n tlc-production --timeout=600s
        kubectl rollout status deployment/semgraph -n tlc-production --timeout=600s
        kubectl rollout status deployment/control-plane -n tlc-production --timeout=600s

    - name: Deploy monitoring stack
      run: |
        export KUBECONFIG=kubeconfig
        kubectl apply -f k8s/monitoring.yaml
        kubectl rollout status deployment/prometheus -n tlc-monitoring --timeout=300s
        kubectl rollout status deployment/grafana -n tlc-monitoring --timeout=300s

    - name: Deploy ingress and networking
      run: |
        export KUBECONFIG=kubeconfig
        kubectl apply -f k8s/ingress.yaml

    - name: Run comprehensive health checks
      run: |
        export KUBECONFIG=kubeconfig
        
        echo "Checking Control Plane health..."
        kubectl run health-check-control-plane --image=curlimages/curl:latest --rm -i --restart=Never -- \
          curl -f http://control-plane-service.tlc-production.svc.cluster.local:3000/api/health
        
        echo "Checking Semgraph health..."
        kubectl run health-check-semgraph --image=curlimages/curl:latest --rm -i --restart=Never -- \
          curl -f http://semgraph-service.tlc-production.svc.cluster.local:8000/health
        
        echo "Checking Guardian health..."
        kubectl run health-check-guardian --image=curlimages/curl:latest --rm -i --restart=Never -- \
          curl -f http://guardian-service.tlc-production.svc.cluster.local:8001/health
        
        echo "Checking database connectivity..."
        kubectl run db-check --image=postgres:15-alpine --rm -i --restart=Never --env="PGPASSWORD=${{ secrets.DATABASE_PASSWORD }}" -- \
          psql -h postgres-service.tlc-production.svc.cluster.local -U tlc_user -d tlc_db -c "SELECT 1;"
        
        echo "Checking Redis connectivity..."
        kubectl run redis-check --image=redis:7-alpine --rm -i --restart=Never -- \
          redis-cli -h redis-service.tlc-production.svc.cluster.local ping

    - name: Run constitutional validation
      run: |
        export KUBECONFIG=kubeconfig
        kubectl run constitutional-validation --image=python:3.11-slim --rm -i --restart=Never -- \
          bash -c "pip install requests && python -c \"
import requests
import sys

# Test constitutional AI endpoints
try:
    response = requests.get('http://control-plane-service.tlc-production.svc.cluster.local:3000/api/constitutional/validate', timeout=30)
    if response.status_code == 200:
        print('Constitutional validation endpoint: OK')
    else:
        print(f'Constitutional validation endpoint failed: {response.status_code}')
        sys.exit(1)
        
    response = requests.get('http://guardian-service.tlc-production.svc.cluster.local:8001/invariants/check', timeout=30)
    if response.status_code == 200:
        print('Guardian invariants endpoint: OK')
    else:
        print(f'Guardian invariants endpoint failed: {response.status_code}')
        sys.exit(1)
        
    print('All constitutional validation checks passed')
except Exception as e:
    print(f'Constitutional validation failed: {e}')
    sys.exit(1)
\""

    - name: Update deployment status
      run: |
        export KUBECONFIG=kubeconfig
        kubectl annotate deployment control-plane deployment.kubernetes.io/revision- -n tlc-production
        kubectl annotate deployment semgraph deployment.kubernetes.io/revision- -n tlc-production
        kubectl annotate deployment guardian deployment.kubernetes.io/revision- -n tlc-production
        
        echo "Deployment completed successfully at $(date)"
        kubectl get pods -n tlc-production
        kubectl get services -n tlc-production

    - name: Notify deployment success
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#deployments'
        text: |
          🚀 Production deployment successful!
          
          Services deployed:
          • Control Plane: ✅
          • Semgraph: ✅
          • Guardian: ✅
          • Database: ✅
          • Redis: ✅
          • Monitoring: ✅
          
          Commit: ${{ github.sha }}
          Deployed by: ${{ github.actor }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: success()

    - name: Notify deployment failure
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#deployments'
        text: |
          ❌ Production deployment failed!
          
          Commit: ${{ github.sha }}
          Attempted by: ${{ github.actor }}
          
          Please check the deployment logs and fix the issues.
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: failure()

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Rollback deployments
      run: |
        export KUBECONFIG=kubeconfig
        kubectl rollout undo deployment/control-plane -n tlc-production
        kubectl rollout undo deployment/semgraph -n tlc-production
        kubectl rollout undo deployment/guardian -n tlc-production
        
        kubectl rollout status deployment/control-plane -n tlc-production --timeout=300s
        kubectl rollout status deployment/semgraph -n tlc-production --timeout=300s
        kubectl rollout status deployment/guardian -n tlc-production --timeout=300s

    - name: Verify rollback
      run: |
        export KUBECONFIG=kubeconfig
        kubectl run rollback-verification --image=curlimages/curl:latest --rm -i --restart=Never -- \
          curl -f http://control-plane-service.tlc-production.svc.cluster.local:3000/api/health

    - name: Notify rollback
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            "text": "🔄 Production rollback completed",
            "attachments": [
              {
                "color": "warning",
                "fields": [
                  {
                    "title": "Rollback Reason",
                    "value": "Deployment failure detected",
                    "short": true
                  },
                  {
                    "title": "Commit",
                    "value": "${{ github.sha }}",
                    "short": true
                  }
                ]
              }
            ]
          }
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}