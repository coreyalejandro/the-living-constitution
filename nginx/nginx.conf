worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers — mirrors agent-sentinel pattern
    add_header X-Frame-Options           "DENY"                         always;
    add_header X-Content-Type-Options    "nosniff"                      always;
    add_header X-XSS-Protection          "1; mode=block"                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; connect-src 'self' http://localhost:3000 http://localhost:8001;" always;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;
    client_max_body_size 1M;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=guardian_api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=control_plane:10m rate=30r/s;

    # Upstream services
    upstream control_plane {
        server control-plane:3000;
    }

    upstream guardian {
        server guardian:8001;
    }

    server {
        listen 80;
        server_name _;

        # Health check — no auth, no rate limit, no log
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Guardian API — rate limited
        location /guardian/ {
            limit_req zone=guardian_api burst=20 nodelay;
            proxy_pass         http://guardian/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Control plane — everything else
        location / {
            limit_req zone=control_plane burst=50 nodelay;
            proxy_pass         http://control_plane;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location ~ /\.  { deny all; }
        location ~ \.(env|config)$ { deny all; }
    }
}
