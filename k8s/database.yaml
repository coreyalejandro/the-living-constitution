apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: database
    app.kubernetes.io/version: "15"
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: the-living-constitution
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: the-living-constitution
        app.kubernetes.io/component: database
        app.kubernetes.io/version: "15"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: postgres
        image: postgres:15-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1 -p 5432
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1 -p 5432
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql/postgresql.conf
          subPath: postgresql.conf
          readOnly: true
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true
      volumes:
      - name: postgres-config
        configMap:
          name: postgres-config
      - name: init-scripts
        configMap:
          name: postgres-init-scripts
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
      labels:
        app.kubernetes.io/name: the-living-constitution
        app.kubernetes.io/component: database
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "fast-ssd"
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: database
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: database
data:
  postgresql.conf: |
    # PostgreSQL configuration for production
    listen_addresses = '*'
    port = 5432
    max_connections = 200
    shared_buffers = 256MB
    effective_cache_size = 1GB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 4MB
    min_wal_size = 1GB
    max_wal_size = 4GB
    max_worker_processes = 8
    max_parallel_workers_per_gather = 2
    max_parallel_workers = 8
    max_parallel_maintenance_workers = 2
    
    # Logging
    log_destination = 'stderr'
    logging_collector = on
    log_directory = 'log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_truncate_on_rotation = on
    log_rotation_age = 1d
    log_rotation_size = 100MB
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    log_temp_files = 0
    
    # Security
    ssl = off
    password_encryption = scram-sha-256
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: database
data:
  01-init-database.sql: |
    -- Initialize The Living Constitution database
    
    -- Create extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";
    
    -- Create schemas
    CREATE SCHEMA IF NOT EXISTS tlc_core;
    CREATE SCHEMA IF NOT EXISTS tlc_governance;
    CREATE SCHEMA IF NOT EXISTS tlc_monitoring;
    CREATE SCHEMA IF NOT EXISTS tlc_audit;
    
    -- Core tables
    CREATE TABLE IF NOT EXISTS tlc_core.sessions (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        user_id VARCHAR(255),
        session_data JSONB,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        expires_at TIMESTAMP WITH TIME ZONE
    );
    
    CREATE TABLE IF NOT EXISTS tlc_core.constitutional_evaluations (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        evaluation_type VARCHAR(100) NOT NULL,
        input_data JSONB NOT NULL,
        result JSONB NOT NULL,
        confidence_score DECIMAL(5,4),
        invariants_checked TEXT[],
        violations JSONB,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        created_by VARCHAR(255)
    );
    
    CREATE TABLE IF NOT EXISTS tlc_governance.invariant_violations (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        invariant_id VARCHAR(100) NOT NULL,
        violation_type VARCHAR(100) NOT NULL,
        severity VARCHAR(20) NOT NULL,
        context JSONB NOT NULL,
        resolution_status VARCHAR(50) DEFAULT 'open',
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        resolved_at TIMESTAMP WITH TIME ZONE
    );
    
    CREATE TABLE IF NOT EXISTS tlc_monitoring.system_metrics (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        service_name VARCHAR(100) NOT NULL,
        metric_name VARCHAR(100) NOT NULL,
        metric_value DECIMAL(15,6) NOT NULL,
        labels JSONB,
        timestamp TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );
    
    CREATE TABLE IF NOT EXISTS tlc_audit.audit_log (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        event_type VARCHAR(100) NOT NULL,
        user_id VARCHAR(255),
        resource_type VARCHAR(100),
        resource_id VARCHAR(255),
        action VARCHAR(100) NOT NULL,
        details JSONB,
        ip_address INET,
        user_agent TEXT,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );
    
    -- Indexes for performance
    CREATE INDEX IF NOT EXISTS idx_sessions_user_id ON tlc_core.sessions(user_id);
    CREATE INDEX IF NOT EXISTS idx_sessions_expires_at ON tlc_core.sessions(expires_at);
    CREATE INDEX IF NOT EXISTS idx_evaluations_type ON tlc_core.constitutional_evaluations(evaluation_type);
    CREATE INDEX IF NOT EXISTS idx_evaluations_created_at ON tlc_core.constitutional_evaluations(created_at);
    CREATE INDEX IF NOT EXISTS idx_violations_invariant ON tlc_governance.invariant_violations(invariant_id);
    CREATE INDEX IF NOT EXISTS idx_violations_status ON tlc_governance.invariant_violations(resolution_status);
    CREATE INDEX IF NOT EXISTS idx_metrics_service ON tlc_monitoring.system_metrics(service_name);
    CREATE INDEX IF NOT EXISTS idx_metrics_timestamp ON tlc_monitoring.system_metrics(timestamp);
    CREATE INDEX IF NOT EXISTS idx_audit_event_type ON tlc_audit.audit_log(event_type);
    CREATE INDEX IF NOT EXISTS idx_audit_created_at ON tlc_audit.audit_log(created_at);
    
    -- Grant permissions
    GRANT USAGE ON SCHEMA tlc_core TO tlc_user;
    GRANT USAGE ON SCHEMA tlc_governance TO tlc_user;
    GRANT USAGE ON SCHEMA tlc_monitoring TO tlc_user;
    GRANT USAGE ON SCHEMA tlc_audit TO tlc_user;
    
    GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA tlc_core TO tlc_user;
    GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA tlc_governance TO tlc_user;
    GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA tlc_monitoring TO tlc_user;
    GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA tlc_audit TO tlc_user;
    
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA tlc_core TO tlc_user;
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA tlc_governance TO tlc_user;
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA tlc_monitoring TO tlc_user;
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA tlc_audit TO tlc_user;