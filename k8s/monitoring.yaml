    bucket =
    region =
    path =
    access_key =
    secret_key =
    
    [external_image_storage.webdav]
    url =
    public_url =
    username =
    password =
    
    [external_image_storage.gcs]
    key_file =
    bucket =
    path =
    
    [external_image_storage.azure_blob]
    account_name =
    account_key =
    container_name =
    
    [external_image_storage.local]
    path =