apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardian
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: guardian
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: the-living-constitution
      app.kubernetes.io/component: guardian
  template:
    metadata:
      labels:
        app.kubernetes.io/name: the-living-constitution
        app.kubernetes.io/component: guardian
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: guardian
        image: ghcr.io/your-org/tlc-guardian:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          name: http
          protocol: TCP
        env:
        - name: PYTHONPATH
          value: "/app"
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: PYTHONUNBUFFERED
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tlc-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          value: "redis://$(REDIS_HOST):$(REDIS_PORT)"
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: REDIS_PORT
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: tlc-secrets
              key: ANTHROPIC_API_KEY
        - name: GUARDIAN_API_KEY
          valueFrom:
            secretKeyRef:
              name: tlc-secrets
              key: GUARDIAN_API_KEY
        - name: GUARDIAN_PORT
          value: "8001"
        - name: CONSTITUTIONAL_MODE
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: CONSTITUTIONAL_MODE
        - name: INVARIANT_ENFORCEMENT
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: INVARIANT_ENFORCEMENT
        - name: GOVERNANCE_VALIDATION
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: GOVERNANCE_VALIDATION
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: LOG_LEVEL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: guardian-config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: tmp
        emptyDir: {}
      - name: guardian-config
        configMap:
          name: guardian-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                  - guardian
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: guardian-service
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: guardian
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: guardian
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: guardian-config
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: guardian
data:
  guardian.yaml: |
    server:
      host: "0.0.0.0"
      port: 8001
      workers: 2
    
    constitutional_ai:
      mode: "strict"
      invariants:
        - "I1_evidence_first"
        - "I2_no_phantom_work"
        - "I3_confidence_verification"
        - "I4_traceability"
        - "I5_safety_over_fluency"
        - "I6_fail_closed"
    
    governance:
      validation_enabled: true
      enforcement_level: "strict"
      audit_logging: true
    
    monitoring:
      metrics_enabled: true
      health_check_interval: 30
      log_level: "info"
    
    security:
      api_key_required: true
      rate_limiting:
        enabled: true
        requests_per_minute: 100
      cors:
        enabled: true
        allowed_origins:
          - "https://your-domain.com"
          - "http://localhost:3000"