apiVersion: apps/v1
kind: Deployment
metadata:
  name: semgraph
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: semgraph
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: the-living-constitution
      app.kubernetes.io/component: semgraph
  template:
    metadata:
      labels:
        app.kubernetes.io/name: the-living-constitution
        app.kubernetes.io/component: semgraph
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: semgraph
        image: ghcr.io/your-org/tlc-semgraph:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: PYTHONPATH
          value: "/app"
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: PYTHONUNBUFFERED
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tlc-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          value: "redis://$(REDIS_HOST):$(REDIS_PORT)"
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: REDIS_PORT
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: tlc-secrets
              key: ANTHROPIC_API_KEY
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: LOG_LEVEL
        - name: MAX_WORKERS
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: MAX_WORKERS
        - name: TIMEOUT_SECONDS
          valueFrom:
            configMapKeyRef:
              name: tlc-config
              key: TIMEOUT_SECONDS
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-cache
          mountPath: /app/.cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: app-cache
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                  - semgraph
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: semgraph-service
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: semgraph
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: semgraph
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: semgraph-hpa
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: semgraph
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: semgraph
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60