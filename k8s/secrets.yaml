apiVersion: v1
kind: Secret
metadata:
  name: tlc-secrets
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database credentials
  DATABASE_PASSWORD: "tlc_password_change_in_production"
  DATABASE_URL: "postgresql://tlc_user:tlc_password_change_in_production@postgres-service:5432/tlc_db"
  
  # API Keys (base64 encoded in production)
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GOOGLE_API_KEY: ""
  
  # JWT and encryption keys
  JWT_SECRET: "your-jwt-secret-change-in-production"
  ENCRYPTION_KEY: "your-encryption-key-change-in-production"
  
  # Session secrets
  SESSION_SECRET: "your-session-secret-change-in-production"
  
  # Guardian service secrets
  GUARDIAN_API_KEY: "your-guardian-api-key-change-in-production"
  
  # Monitoring credentials
  GRAFANA_ADMIN_PASSWORD: "admin-change-in-production"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_DB: "tlc_db"
  POSTGRES_USER: "tlc_user"
  POSTGRES_PASSWORD: "tlc_password_change_in_production"
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: tlc-production
  labels:
    app.kubernetes.io/name: the-living-constitution
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  # Replace with actual TLS certificate and key (base64 encoded)
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t...